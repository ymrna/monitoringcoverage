<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Monitoring Coverage</title>

<link rel="stylesheet" href="/static/style.css">

<link rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="/static/xlsx.full.min.js"></script>

</head>

<body>

<div class="title-bar">

<a href="/static/TemplateMonitoringTitikUkur.xlsx"
   class="download-btn"
   download>

📥 Download Template

</a>

<div class="title">
Monitoring Coverage
</div>

<div style="width:150px;"></div>

</div>

<div class="map-card">
<div id="map"></div>
</div>

<div class="container">

<textarea id="coords"
placeholder="Lat,Lon (contoh: -6.2,106.8)">
</textarea>

<input type="file"
id="excelFile"
accept=".xlsx">

<br>

<button id="btnHitung">
Hitung Titik Ukur
</button>

<button id="btnMyLoc">
📍 Lokasi Saya
</button>

<button id="btnClear"
class="danger">
Clear
</button>

<button id="btnSave">
💾 Save
</button>

<button id="btnHistory">
📂 History
</button>

<button id="btnExport">
📊 Export Excel
</button>

<div id="status"></div>

</div>

<div id="overlay"></div>

<!-- FIX ID -->
<div id="sidepanel"
class="sidepanel">

<h3>Daftar Titik</h3>

<table id="pointTable"></table>

<hr>

<h3>History</h3>

<div id="historyList"></div>

</div>

<button id="fabPanel"
class="floating-panel-btn">

📋

</button>

<script src="/static/app.js"></script>

</body>
</html>
